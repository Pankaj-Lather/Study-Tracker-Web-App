<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Timer App</title>
    <style>
        :root {
            --bg-main: #121212;
            --bg-card: #1E1E2E;
            --accent: #FF7B00;
            --text-light: #FFFFFF;
            --text-muted: #A0A0B0;
            --font-main: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
            user-select: none;
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-light);
        }

        .app-container {
            width: 375px;
            height: 812px;
            background-color: var(--bg-main);
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
            border: 8px solid #333;
            display: flex;
            flex-direction: column;
        }

        /* --- HOME SCREEN --- */
        #home-screen {
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
        }

        .header {
            padding: 40px 20px 20px;
            background-color: var(--bg-main);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2A2A3C;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
        }

        .streak {
            font-size: 14px;
            color: var(--text-muted);
        }

        .subject-list {
            padding: 20px;
            overflow-y: auto;
            flex-grow: 1;
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            margin-top: 100px;
            font-size: 16px;
        }

        .subject-card {
            background-color: var(--bg-card);
            padding: 18px;
            border-radius: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            position: relative;
        }

        .subject-card:hover {
            transform: scale(1.02);
            background-color: #252538;
        }

        .subject-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-grow: 1;
        }

        .play-icon {
            width: 40px;
            height: 40px;
            background-color: rgba(255, 123, 0, 0.15);
            color: var(--accent);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
        }

        .subject-name {
            font-size: 16px;
            font-weight: 600;
        }

        .subject-time {
            color: var(--text-muted);
            font-size: 14px;
            font-family: monospace;
            font-weight: bold;
        }

        .more-options {
            color: var(--text-muted);
            font-size: 20px;
            padding: 5px 10px;
            cursor: pointer;
            margin-left: 10px;
        }

        .more-options:hover {
            color: white;
        }

        .fab {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 30px;
            box-shadow: 0 10px 20px rgba(255, 123, 0, 0.4);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s;
            z-index: 5;
        }

        .fab:hover {
            transform: scale(1.1);
        }

        /* --- MODAL (Add Subject Popup) --- */
        #add-modal {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }

        .modal-content {
            background-color: var(--bg-card);
            padding: 25px;
            border-radius: 20px;
            width: 80%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .modal-content input {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background: var(--bg-main);
            color: white;
            outline: none;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 10px;
        }

        .modal-actions button {
            padding: 10px 15px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-cancel { background: transparent; color: var(--text-muted); }
        .btn-add { background: var(--accent); color: white; }

        /* --- FOCUS SCREEN --- */
        #focus-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-main);
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            z-index: 10;
        }

        #focus-screen.active {
            transform: translateY(0);
        }

        .focus-header {
            padding: 40px 20px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--text-light);
            font-size: 24px;
            cursor: pointer;
        }

        .focus-title {
            font-size: 18px;
            font-weight: 600;
        }

        .focus-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .focus-card {
            background-color: var(--bg-card);
            width: 100%;
            border-radius: 24px;
            padding: 30px 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .timer-huge {
            font-size: 64px;
            font-weight: 800;
            margin: 10px 0 20px 0;
            font-variant-numeric: tabular-nums;
            font-family: monospace;
        }

        /* NEW: Pause Button Styles */
        .controls {
            display: flex;
            justify-content: center;
        }

        .btn-pause {
            background-color: var(--accent);
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 15px rgba(255, 123, 0, 0.3);
            transition: transform 0.1s;
        }

        .btn-pause:active {
            transform: scale(0.9);
        }

        .student-avatar-container {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .student-logo {
            width: 80px; height: 80px;
            background-color: #2A2A3C;
            border-radius: 20px;
            display: flex; justify-content: center; align-items: center;
            font-size: 40px;
            border: 2px solid var(--accent);
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div id="home-screen">
            <div class="header">
                <h1>Today's Plan</h1>
                <span class="streak">🔥 0 Day Streak</span>
            </div>

            <div class="subject-list" id="subject-list">
                </div>

            <button class="fab" onclick="openAddModal()">+</button>
        </div>

        <div id="add-modal">
            <div class="modal-content">
                <h3 style="margin-bottom: 5px;">Add New Subject</h3>
                <input type="text" id="subject-input" placeholder="E.g., Web Development">
                <input type="text" id="goal-input" placeholder="Goal (e.g., 2 hrs)">
                <div class="modal-actions">
                    <button class="btn-cancel" onclick="closeAddModal()">Cancel</button>
                    <button class="btn-add" onclick="addSubject()">Add Subject</button>
                </div>
            </div>
        </div>

        <div id="focus-screen">
            <div class="focus-header">
                <button class="back-btn" onclick="closeFocusMode()">←</button>
                <span class="focus-title" id="current-subject-title">Subject Name</span>
            </div>

            <div class="focus-content">
                <div class="focus-card">
                    <div style="color: var(--text-muted); font-size: 14px; font-weight: bold; letter-spacing: 1px;">FOCUSING</div>
                    <div class="timer-huge" id="main-timer">00:00:00</div>
                    
                    <div class="controls">
                        <button id="pause-btn" class="btn-pause" onclick="togglePause()">⏸</button>
                    </div>
                </div>

                <div class="student-avatar-container">
                    <div class="student-logo">👨‍💻</div>
                    <div style="font-weight: 600; color: var(--accent);">Pankaj</div>
                    <div style="font-size: 12px; color: var(--text-muted);">Studying Hard 📚</div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Data array now holds total time spent for each subject
        let subjects = [];
        
        // Timer Variables
        let timerInterval = null;
        let sessionSeconds = 0;
        let activeSubjectIndex = null;
        let isPaused = false;

        function formatTime(sec) {
            const h = String(Math.floor(sec / 3600)).padStart(2, '0');
            const m = String(Math.floor((sec % 3600) / 60)).padStart(2, '0');
            const s = String(sec % 60).padStart(2, '0');
            return `${h}:${m}:${s}`;
        }

        function renderSubjects() {
            const list = document.getElementById('subject-list');
            list.innerHTML = ''; 

            if (subjects.length === 0) {
                list.innerHTML = `<div class="empty-state">No subjects yet.<br>Click the + button to add one!</div>`;
                return;
            }

            subjects.forEach((subject, index) => {
                const totalTimeFormatted = formatTime(subject.totalSeconds || 0);

                const card = document.createElement('div');
                card.className = 'subject-card';
                card.innerHTML = `
                    <div class="subject-info" onclick="openFocusMode(${index})">
                        <div class="play-icon">▶</div>
                        <div>
                            <div class="subject-name">${subject.name}</div>
                            <div class="subject-time" style="color: var(--text-muted); font-family: system-ui; font-size: 12px; font-weight: normal;">Goal: ${subject.goal}</div>
                        </div>
                    </div>
                    
                    <div class="subject-time" style="color: var(--accent);">${totalTimeFormatted}</div>
                    
                    <div class="more-options" onclick="renameSubject(${index}, event)">⋮</div>
                `;
                list.appendChild(card);
            });
        }

        function openAddModal() {
            document.getElementById('add-modal').style.display = 'flex';
        }

        function closeAddModal() {
            document.getElementById('add-modal').style.display = 'none';
            document.getElementById('subject-input').value = '';
            document.getElementById('goal-input').value = '';
        }

        function addSubject() {
            const name = document.getElementById('subject-input').value;
            const goal = document.getElementById('goal-input').value || '1 hr';
            
            if (name.trim() !== "") {
                // Notice we initialize totalSeconds: 0 for every new subject
                subjects.push({ name: name, goal: goal, totalSeconds: 0 });
                renderSubjects();
                closeAddModal();
            } else {
                alert("Please enter a subject name!");
            }
        }

        function renameSubject(index, event) {
            event.stopPropagation(); 
            const newName = prompt("Rename subject to:", subjects[index].name);
            if (newName && newName.trim() !== "") {
                subjects[index].name = newName;
                renderSubjects();
            }
        }

        // --- UPDATED TIMER LOGIC ---

        function openFocusMode(index) {
            activeSubjectIndex = index;
            document.getElementById('current-subject-title').innerText = subjects[index].name;
            document.getElementById('focus-screen').classList.add('active');

            // Reset the session timer and button state
            sessionSeconds = 0;
            isPaused = false;
            document.getElementById('pause-btn').innerText = "⏸";
            document.getElementById('main-timer').innerText = "00:00:00";

            // Start ticking!
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                sessionSeconds++;
                document.getElementById('main-timer').innerText = formatTime(sessionSeconds);
            }, 1000);
        }

        // NEW: Pause functionality
        function togglePause() {
            const btn = document.getElementById('pause-btn');
            
            if (isPaused) {
                // Resume the timer
                isPaused = false;
                btn.innerText = "⏸";
                timerInterval = setInterval(() => {
                    sessionSeconds++;
                    document.getElementById('main-timer').innerText = formatTime(sessionSeconds);
                }, 1000);
            } else {
                // Pause the timer
                isPaused = true;
                btn.innerText = "▶";
                clearInterval(timerInterval);
            }
        }

        // UPDATED: Back functionality now saves progress!
        function closeFocusMode() {
            // Slide screen down
            document.getElementById('focus-screen').classList.remove('active');
            
            // Stop the timer
            clearInterval(timerInterval);

            // Add the session time to the subject's total time
            if (activeSubjectIndex !== null) {
                subjects[activeSubjectIndex].totalSeconds += sessionSeconds;
            }

            // Re-render the home screen to show updated times!
            renderSubjects();
            
            // Clear the active subject
            activeSubjectIndex = null;
        }

        renderSubjects();
    </script>
</body>
</html>
